<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Сканер — Soudal</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #5b9cf6; --purple: #a78bfa; --green: #4ade80; --red: #f87171;
  --orange: #fb923c;
  --bg: #0a0a0a; --card: #1c1c1e; --border: #2c2c2e;
  --text: #f0f0f0; --sub: #888;
}
[data-theme="light"] {
  --bg: #f5f3ef; --card: #ffffff; --border: #e2dfd8;
  --text: #1a1917; --sub: #6b6860;
  --blue: #1a4db8; --purple: #7c3aed; --green: #15803d;
  --red: #dc2626; --orange: #ea580c;
}
html, body { background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: background .25s, color .25s; }

/* theme toggle */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px 0; max-width: 480px; margin: 0 auto;
}
.top-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: background .2s, border-color .2s;
  -webkit-tap-highlight-color: transparent;
}
.top-btn:active { opacity: .7; }
.theme-icon { font-size: 14px; line-height: 1; }

/* ── header ── */
.header { padding: 14px 18px 8px; text-align: center; }
.header h1 { font-size: 17px; font-weight: 700; }
.header p  { font-size: 12px; color: var(--sub); margin-top: 3px; }

/* ── mode tabs ── */
.tabs { display: flex; gap: 8px; padding: 0 18px 10px; max-width: 480px; margin: 0 auto; }
.tab {
  flex: 1; padding: 9px 4px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--sub); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { border-color: var(--blue); color: var(--blue); background: rgba(91,156,246,.1); }

/* ── reader ── */
#reader {
  width: 100%; max-width: 480px; margin: 0 auto;
  border-radius: 14px; overflow: hidden; background: #000;
  border: 1px solid var(--border);
}
#reader__dashboard_section_swaplink,
#reader__status_span,
#reader__header_message { display: none !important; }
#reader img { display: none; }
#reader select {
  background: var(--card); color: var(--text);
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 6px 10px; font-size: 13px; margin: 6px auto; display: block;
}

/* ── camera controls panel ── */
#cam-controls {
  display: none;
  max-width: 480px; margin: 0 auto;
  padding: 10px 18px 0;
  flex-direction: column;
  gap: 8px;
}
#cam-controls.show { display: flex; }

.ctrl-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
}
.ctrl-row label {
  font-size: 12px; font-weight: 600; color: var(--sub);
  min-width: 70px; white-space: nowrap;
}
.ctrl-row input[type=range] {
  flex: 1; accent-color: var(--blue); height: 4px;
  background: var(--border); border-radius: 4px;
}
.ctrl-row .ctrl-val {
  font-size: 12px; font-weight: 700; color: var(--blue);
  min-width: 34px; text-align: right;
}

/* torch button */
#torch-btn {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--card); border: 1.5px solid var(--border);
  color: var(--text); font-size: 13px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
#torch-btn.on {
  background: rgba(251,191,36,.12);
  border-color: #fbbf24; color: #fbbf24;
}
#torch-btn:active { opacity: .7; }

/* settings toggle button */
#settings-toggle {
  display: none; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: 20px;
  background: var(--card); border: 1.5px solid var(--border);
  color: var(--sub); font-size: 12px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: all .15s; margin: 0 auto;
}
#settings-toggle.show { display: flex; }
#settings-toggle.active { border-color: var(--blue); color: var(--blue); }

/* ── bottom ── */
.bottom { padding: 12px 18px 28px; display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }

#status { text-align: center; font-size: 13px; color: var(--sub); min-height: 17px; transition: color .2s; }
#status.ok  { color: var(--green); }
#status.err { color: var(--red); }
#status.loading { color: var(--orange); }

.row { display: flex; gap: 8px; }
input[type=text], input[type=number] {
  flex: 1; padding: 12px 14px; background: var(--card);
  border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 15px; outline: none; -webkit-appearance: none;
}
input:focus { border-color: var(--blue); }
input::placeholder { color: #444; }
input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

.btn { padding: 12px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
.btn:active { opacity: .7; }
.btn-gray  { background: var(--card); color: #ccc; }
.btn-start { background: var(--blue); color: #fff; width: 100%; padding: 13px; font-size: 15px;
  border-radius: 12px; border: none; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent; }

/* ── result card ── */
#result-card {
  display: none; background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px; flex-direction: column; gap: 6px;
}
#result-card.show { display: flex; }
.result-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .5px; align-self: flex-start;
}
.badge-ean  { background: rgba(91,156,246,.12); color: var(--blue); }
.badge-crpt { background: rgba(74,222,128,.12); color: var(--green); }
.badge-warn { background: rgba(251,146,60,.12);  color: var(--orange); }
.badge-err  { background: rgba(248,113,113,.12); color: var(--red); }
[data-theme="light"] .badge-ean  { background: rgba(26,77,184,.1); }
[data-theme="light"] .badge-crpt { background: rgba(21,128,61,.1); }
[data-theme="light"] .badge-warn { background: rgba(234,88,12,.1); }
[data-theme="light"] .badge-err  { background: rgba(220,38,38,.1); }

.result-row { display: flex; flex-direction: column; gap: 2px; }
.result-row .lbl { font-size: 11px; color: var(--sub); }
.result-row .val { font-size: 14px; font-weight: 600; line-height: 1.4; }
.result-row .val.big { font-size: 22px; font-weight: 800; color: var(--blue); letter-spacing: 1.5px; }

.divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ── action buttons ── */
#send-btn {
  display: none; width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#send-btn.show { display: block; }
#rescan-btn {
  display: none; width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: var(--card); color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
#rescan-btn.show { display: block; }

/* ── success ── */
#success {
  display: none; position: fixed; inset: 0; background: var(--bg); z-index: 99;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; text-align: center; padding: 32px;
}
#success.show { display: flex; }
#success .icon  { font-size: 64px; animation: pop .4s cubic-bezier(.18,.89,.32,1.28); }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
#success .title { font-size: 20px; font-weight: 800; }
#success .ean   { font-size: 22px; font-weight: 800; color: var(--blue); letter-spacing: 2px;
  background: var(--card); padding: 10px 22px; border-radius: 10px; cursor: pointer; }
.steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; text-align: left; }
.step { display: flex; align-items: flex-start; gap: 12px; }
.step-num { background: var(--blue); color: #fff; font-weight: 800; font-size: 13px;
  width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; margin-top: 2px; }
.step-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.open-btn { width: 100%; max-width: 300px; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.copy-btn { padding: 11px 24px; border-radius: 10px; border: 1.5px solid var(--border);
  background: transparent; color: var(--text); font-size: 14px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent; }
.again-btn { padding: 11px 24px; border-radius: 10px; border: none;
  background: var(--card); color: var(--sub); font-size: 14px; font-weight: 600;
  cursor: pointer; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>

<div class="top-bar">
  <a class="top-btn" href="guide.html" target="_blank">📋 Инструкция</a>
  <button class="top-btn" onclick="toggleTheme()" id="theme-btn">
    <span class="theme-icon" id="theme-icon">☀️</span>
    <span id="theme-label">Светлая</span>
  </button>
</div>
<div class="header">
  <h1>📷 Сканер</h1>
  <p>EAN штрих-код или DataMatrix Честного знака</p>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-ean" onclick="switchMode('ean')">📦 EAN / Штрих-код</div>
  <div class="tab" id="tab-crpt" onclick="switchMode('crpt')">✅ Честный знак</div>
</div>

<div id="reader"></div>

<!-- Settings toggle button -->
<div style="display:flex;justify-content:center;padding:8px 18px 0;max-width:480px;margin:0 auto;">
  <button id="settings-toggle" onclick="toggleSettings()">⚙️ Настройки камеры</button>
</div>

<!-- Camera controls panel -->
<div id="cam-controls">
  <!-- Zoom -->
  <div class="ctrl-row" id="zoom-row" style="display:none">
    <label>🔍 Зум</label>
    <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1"
           oninput="applyZoom(this.value)">
    <span class="ctrl-val" id="zoom-val">1×</span>
  </div>

  <!-- Torch -->
  <button id="torch-btn" onclick="toggleTorch()" style="display:none">
    🔦 Фонарик выключен
  </button>
</div>

<div class="bottom">
  <div id="status">Нажмите кнопку для запуска камеры</div>

  <button class="btn-start" id="start-btn" onclick="startScanner()">📷 Запустить камеру</button>

  <div class="row">
    <input id="manual" type="text" inputmode="text" placeholder="Введите код вручную">
    <button class="btn btn-gray" onclick="submitManual()">Найти</button>
  </div>

  <div id="result-card"></div>

  <button id="send-btn" onclick="sendToBot()">📲 Отправить в бот</button>
  <button id="rescan-btn" onclick="rescan()">🔄 Сканировать ещё раз</button>
</div>

<!-- Success -->
<div id="success">
  <div class="icon">✅</div>
  <div class="title">Готово!</div>
  <div class="ean" id="success-ean" onclick="copyEAN()"></div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div>
      <div class="step-text">Код скопирован в буфер обмена</div></div>
    <div class="step"><div class="step-num">2</div>
      <div class="step-text">Нажмите кнопку — откроется чат с ботом</div></div>
    <div class="step"><div class="step-num">3</div>
      <div class="step-text">Долгое нажатие в поле → <b>Вставить → Отправить</b></div></div>
  </div>
  <button class="open-btn" onclick="openBot()">📲 Открыть чат с ботом</button>
  <button class="copy-btn" id="copy-again-btn" onclick="copyAndConfirm()">📋 Скопировать ещё раз</button>
  <button class="again-btn" onclick="resetAll()">🔄 Сканировать другой товар</button>
</div>

<script>
// ══════════════════════════════════
const VK_GROUP_ID = '236652808';
// ══════════════════════════════════

// XSS защита — экранируем все данные из API перед вставкой в HTML
function esc(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// Fetch с таймаутом (8 секунд)
async function fetchWithTimeout(url, options = {}, ms = 8000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  try {
    return await fetch(url, { ...options, signal: ctrl.signal });
  } finally {
    clearTimeout(tid);
  }
}

let scanner     = null;
let scanActive  = false;
let scannedEAN  = '';
let currentMode = 'ean';
let torchOn     = false;
let torchSupported = false;
let zoomSupported  = false;
let currentStream  = null;
let settingsOpen   = false;

const statusEl   = document.getElementById('status');
const startBtn   = document.getElementById('start-btn');
const resultCard = document.getElementById('result-card');
const sendBtnEl  = document.getElementById('send-btn');
const rescanBtn  = document.getElementById('rescan-btn');

// ── Theme ────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const newTheme = isLight ? 'dark' : 'light';
  document.documentElement.dataset.theme = newTheme;
  localStorage.setItem('scanner-theme', newTheme);
  updateThemeBtn(newTheme);
}

function updateThemeBtn(theme) {
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (theme === 'light') {
    icon.textContent  = '🌙';
    label.textContent = 'Тёмная';
  } else {
    icon.textContent  = '☀️';
    label.textContent = 'Светлая';
  }
}

// Init theme from saved preference or system setting
(function() {
  const saved = localStorage.getItem('scanner-theme');
  const sys   = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  const theme = saved || sys;
  document.documentElement.dataset.theme = theme;
  updateThemeBtn(theme);
})();

function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

// ── Settings panel toggle ────────────────────────
function toggleSettings() {
  settingsOpen = !settingsOpen;
  const panel  = document.getElementById('cam-controls');
  const btn    = document.getElementById('settings-toggle');
  if (settingsOpen) {
    panel.classList.add('show');
    btn.classList.add('active');
    btn.textContent = '⚙️ Скрыть настройки';
  } else {
    panel.classList.remove('show');
    btn.classList.remove('active');
    btn.textContent = '⚙️ Настройки камеры';
  }
}

// ── Mode switch ──────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-ean').classList.toggle('active', mode === 'ean');
  document.getElementById('tab-crpt').classList.toggle('active', mode === 'crpt');
  document.getElementById('manual').placeholder =
    mode === 'ean' ? 'Введите EAN вручную' : 'Вставьте код DataMatrix';
  if (scanActive && scanner) {
    scanActive = false;
    scanner.stop().then(() => { scanner = null; startScanner(); }).catch(() => { scanner = null; startScanner(); });
  }
}

// ── Get video track for advanced controls ────────
function getVideoTrack() {
  try {
    const video = document.querySelector('#reader video');
    if (!video || !video.srcObject) return null;
    const tracks = video.srcObject.getVideoTracks();
    return tracks.length ? tracks[0] : null;
  } catch(_) { return null; }
}

// ── Zoom ─────────────────────────────────────────
function applyZoom(val) {
  val = parseFloat(val);
  document.getElementById('zoom-val').textContent = val.toFixed(1) + '×';
  const track = getVideoTrack();
  if (!track) return;
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) {
      // Clamp to actual camera range
      const zMin = caps.zoom.min || 1;
      const zMax = caps.zoom.max || 5;
      const zVal = Math.min(Math.max(val, zMin), zMax);
      track.applyConstraints({ advanced: [{ zoom: zVal }] }).catch(() => {});
    }
  } catch(_) {}
}

// ── Torch ─────────────────────────────────────────
async function toggleTorch() {
  const track = getVideoTrack();
  if (!track) return;
  try {
    torchOn = !torchOn;
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    const btn = document.getElementById('torch-btn');
    btn.textContent = torchOn ? '🔦 Фонарик включён' : '🔦 Фонарик выключен';
    btn.classList.toggle('on', torchOn);
  } catch(e) {
    torchOn = false;
    console.warn('Torch not supported:', e);
  }
}

// ── Probe camera capabilities after start ────────
function probeCapabilities() {
  setTimeout(() => {
    const track = getVideoTrack();
    if (!track) return;
    try {
      const caps = track.getCapabilities();

      // Zoom
      if (caps.zoom) {
        zoomSupported = true;
        const slider = document.getElementById('zoom-slider');
        slider.min   = caps.zoom.min   || 1;
        slider.max   = caps.zoom.max   || 5;
        slider.step  = caps.zoom.step  || 0.1;
        slider.value = 1;
        document.getElementById('zoom-row').style.display = 'flex';
      }

      // Torch
      if (caps.torch) {
        torchSupported = true;
        document.getElementById('torch-btn').style.display = 'flex';
      }

      // Show settings toggle if anything is available
      if (zoomSupported || torchSupported) {
        document.getElementById('settings-toggle').classList.add('show');
      }

      // Auto-apply continuous autofocus
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
      }

    } catch(e) {
      console.log('Capability probe error:', e);
    }
  }, 800); // wait for stream to stabilize
}

// ── Scanner ──────────────────────────────────────────
async function startScanner() {
  startBtn.style.display = 'none';
  torchOn = false;
  const torchBtn = document.getElementById('torch-btn');
  torchBtn.textContent = '🔦 Фонарик выключен';
  torchBtn.classList.remove('on');

  setStatus('Запрашиваю доступ к камере…');

  const eanFormats = [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.ITF,
  ];
  const crptFormats = [
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.CODE_128,
  ];

  // ─────────────────────────────────────────────────────────
  // videoConstraints — ключ к качественному чтению 15×15 мм!
  // Запрашиваем максимально доступное разрешение + автофокус
  // ─────────────────────────────────────────────────────────
  const videoConstraints = {
    facingMode:  { ideal: 'environment' },
    width:       { ideal: 3840, min: 1280 },   // 4K → fallback 1080p → 720p
    height:      { ideal: 2160, min: 720  },
    focusMode:   { ideal: 'continuous' },        // непрерывный автофокус
    frameRate:   { ideal: 30, min: 15 },
    // Дополнительные hints для макро-фокуса:
    zoom:        { ideal: 1 },                   // старт без зума, юзер сам докрутит
  };

  // Уменьшаем область сканирования — меньший бокс = быстрее и точнее
  // для мелких кодов 15×15 мм
  const qrboxEan  = { width: 220, height: 80  };  // было 260×100
  const qrboxCrpt = { width: 180, height: 180 };  // было 220×220

  try {
    scanner = new Html5Qrcode('reader', {
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: true  // Chrome BarcodeDetector API — быстрее и точнее
      },
      verbose: false,
    });

    await scanner.start(
      videoConstraints,
      {
        fps: 30,               // Увеличиваем до 30 кадров
        qrbox: currentMode === 'ean' ? qrboxEan : qrboxCrpt,
        aspectRatio: currentMode === 'ean' ? 1.7 : 1.0,
        formatsToSupport: currentMode === 'ean' ? eanFormats : crptFormats,
        disableFlip: false,    // разрешить зеркальные коды
      },
      onScanSuccess,
      () => {}
    );

    scanActive = true;

    // После запуска — пробуем применить расширенные ограничения напрямую
    // через MediaStreamTrack для надёжного автофокуса и резкости
    applyAdvancedCameraSettings();
    probeCapabilities();

    setStatus(currentMode === 'ean'
      ? 'Наведите камеру на штрих-код…'
      : 'Наведите камеру на квадратный код DataMatrix…');
  } catch(e) {
    startBtn.style.display = 'block';
    if (/NotAllowed|Permission/i.test(e.toString()))
      setStatus('⛔ Доступ к камере запрещён. Разрешите в настройках браузера.', 'err');
    else if (/NotFound/i.test(e.toString()))
      setStatus('📵 Камера не найдена. Введите код вручную.', 'err');
    else
      setStatus('❌ Не удалось запустить камеру. Введите код вручную.', 'err');
  }
}

// ── Применяем расширенные настройки через track.applyConstraints ──
function applyAdvancedCameraSettings() {
  setTimeout(() => {
    const track = getVideoTrack();
    if (!track) return;
    try {
      const caps = track.getCapabilities();
      const advanced = [];

      // Непрерывный автофокус
      if (caps.focusMode) {
        if (caps.focusMode.includes('continuous')) {
          advanced.push({ focusMode: 'continuous' });
        }
      }
      // Фокусное расстояние — по возможности ближний диапазон
      if (caps.focusDistance) {
        // Ставим фокус в зону 5–15 см (мелкие коды на близком расстоянии)
        const near = caps.focusDistance.min || 0;
        const fd   = Math.max(near, Math.min(0.15, (caps.focusDistance.max || 1) * 0.2));
        advanced.push({ focusDistance: fd });
      }
      // Максимальная резкость
      if (caps.sharpness) {
        advanced.push({ sharpness: caps.sharpness.max });
      }
      // Минимальный ISO (уменьшает шум)
      if (caps.iso) {
        advanced.push({ iso: caps.iso.min });
      }
      // Максимальная экспозиция для чёткости
      if (caps.exposureMode && caps.exposureMode.includes('continuous')) {
        advanced.push({ exposureMode: 'continuous' });
      }
      // Баланс белого
      if (caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')) {
        advanced.push({ whiteBalanceMode: 'continuous' });
      }

      if (advanced.length) {
        track.applyConstraints({ advanced }).catch(e => console.log('Advanced constraints:', e));
      }
    } catch(e) {
      console.log('Advanced settings error:', e);
    }
  }, 1200);
}

let lastScan = 0;
function onScanSuccess(raw) {
  if (!scanActive) return;
  const now = Date.now();
  if (now - lastScan < 1200) return;
  lastScan = now;
  scanActive = false;
  scanner.stop().catch(() => {});

  // Выключаем фонарик при успехе
  if (torchOn) {
    const track = getVideoTrack();
    if (track) track.applyConstraints({ advanced: [{ torch: false }] }).catch(() => {});
    torchOn = false;
    document.getElementById('torch-btn').classList.remove('on');
  }

  try { navigator.vibrate?.(120); } catch(_) {}

  if (currentMode === 'crpt') {
    processHonestSign(raw);
  } else {
    const ean = raw.replace(/\D/g, '');
    if (ean.length < 8) {
      setStatus('Код не распознан как EAN. Попробуйте ещё.', 'err');
      rescan(); return;
    }
    showEANResult(ean);
  }
}

// ── EAN result ───────────────────────────────────────
function showEANResult(ean) {
  scannedEAN = ean;
  resultCard.innerHTML = `
    <div class="result-badge badge-ean">📦 EAN штрих-код</div>
    <div class="result-row">
      <div class="lbl">Код товара</div>
      <div class="val big">${ean}</div>
    </div>
    <div class="result-row">
      <div class="lbl">Что дальше</div>
      <div class="val">Отправьте в бот — получите данные из ERP</div>
    </div>`;
  resultCard.classList.add('show');
  sendBtnEl.classList.add('show');
  rescanBtn.classList.add('show');
  setStatus('✅ EAN считан!', 'ok');
}

// ── Честный знак ─────────────────────────────────────
async function processHonestSign(raw) {
  setStatus('🔍 Запрашиваю данные Честного знака…', 'loading');
  resultCard.innerHTML = `<div style="text-align:center;padding:16px;color:var(--sub)">⏳ Загрузка…</div>`;
  resultCard.classList.add('show');

  const gtin = extractGTIN(raw);
  const eanFromGtin = gtin ? gtin.replace(/^0+/, '') : '';

  try {
    const encoded = encodeURIComponent(raw);
    const url = `https://mobile.api.crpt.ru/mobile/check?code=${encoded}`;

    const resp = await fetchWithTimeout(url, {
      headers: { 'Accept': 'application/json' }
    }, 8000);

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    window._rawApiText = text;
    const data = JSON.parse(text);

    renderHonestSignResult(data, raw, eanFromGtin || gtin);

  } catch(e) {
    console.error('Честный знак API:', e);
    if (e.name === 'AbortError') {
      setStatus('⏱️ API не ответил за 8 сек. Введите EAN вручную.', 'err');
      rescanBtn.classList.add('show');
    } else {
      renderHonestSignFallback(raw, gtin, eanFromGtin);
    }
  }
}

function extractGTIN(raw) {
  const m = raw.match(/^01(\d{14})/);
  return m ? m[1] : null;
}

function renderHonestSignResult(data, raw, ean) {
  const cd    = data.constructionData || {};
  const cr    = data.codeResolveData  || {};
  const cat   = (data.catalogData && data.catalogData[0]) || {};
  const attrs = cat.good_attrs || [];

  const name         = cd.productName    || data.productName || '—';
  const brand        = cd.brand          || '—';
  const country      = cd.country        || '';
  const volume       = cd.volumeWeight   || '';
  const kind         = cd.productKind    || '';
  const tnvd         = cd.tnvd           || '';
  const rawStatus    = cd.status         || '';
  const cert         = cd.certDoc        || (cd.certDocList && cd.certDocList[0]) || null;
  const gtin         = (cd.gtin || cr.gtin || extractGTIN(raw) || '').replace(/^0+/, '');

  const producedMs   = cd.producedDate   ? Number(cd.producedDate)   : null;
  const introducedMs = cd.introducedDate ? Number(cd.introducedDate) : null;
  const expire       = cd.expirationDate || '';

  const producerAttr = attrs.find(a => a.attr_id === 2503);
  const producer     = producerAttr ? producerAttr.attr_value : '';
  const artAttr      = attrs.find(a => a.attr_id === 13797);
  const supplierArt  = artAttr ? artAttr.attr_value : '';
  const tuAttr       = attrs.find(a => a.attr_id === 4404);
  const tuDoc        = tuAttr ? `${tuAttr.attr_value_type || ''} ${tuAttr.attr_value}`.trim() : '';
  const packAttr     = attrs.find(a => a.attr_id === 2710 && a.level === 'trade-unit');
  const packType     = packAttr ? packAttr.attr_value : '';
  const packMatAttr  = attrs.find(a => a.attr_id === 2713 && a.level === 'trade-unit');
  const packMat      = packMatAttr ? packMatAttr.attr_value : '';
  const boxAttr      = attrs.find(a => a.attr_id === 2710 && a.level === 'inner-pack');
  const boxQty       = boxAttr ? boxAttr.multiplier : '';
  const boxGtin      = cat.identified_by
    ? ((cat.identified_by.find(i => i.level === 'inner-pack') || {}).value || '')
    : '';

  const statusMap = {
    INTRODUCED:    { icon: '✅', label: 'В обороте',              color: 'var(--green)',  note: 'Товар легально продаётся',                    ok: true  },
    APPLIED:       { icon: '🟡', label: 'Код нанесён',            color: 'var(--orange)', note: 'Произведён, но ещё не введён в оборот',        ok: false },
    EMITTED:       { icon: '🔵', label: 'Код выпущен',            color: 'var(--blue)',   note: 'Маркировка заказана, товар не произведён',     ok: false },
    RETIRED:       { icon: '⛔', label: 'Выбыл из оборота',       color: 'var(--sub)',    note: 'Продан конечному покупателю или списан',       ok: false },
    WRITTEN_OFF:   { icon: '⛔', label: 'Списан',                 color: 'var(--red)',    note: 'Утилизация, брак или уничтожение',             ok: false },
    DISAGGREGATION:{ icon: '📦', label: 'Расформирован',          color: 'var(--sub)',    note: 'Групповая упаковка разобрана на штуки',        ok: false },
    WITHDRAWN:     { icon: '⚠️', label: 'Отозван',               color: 'var(--red)',    note: 'Добровольный отзыв производителем',            ok: false },
    RECALLED:      { icon: '🚨', label: 'Принудительный отзыв',  color: 'var(--red)',    note: 'Предписание надзорного органа',                ok: false },
  };

  const st       = statusMap[rawStatus] || { icon: '❓', label: rawStatus || 'Неизвестен', color: 'var(--sub)', note: '', ok: false };
  const statusText = st.label;
  const isOk       = st.ok;

  const badge = '<div class="result-badge ' + (isOk ? 'badge-crpt' : rawStatus === 'APPLIED' || rawStatus === 'EMITTED' ? 'badge-warn' : 'badge-err') + '">'
    + st.icon + ' Честный знак — ' + statusText + '</div>'
    + (st.note ? '<div style="font-size:11px;color:' + st.color + ';margin-top:2px;font-weight:600">' + esc(st.note) + '</div>' : '');

  function row(lbl, val) {
    if (!val && val !== 0) return '';
    return `<div class="divider"></div>
    <div class="result-row">
      <div class="lbl">${lbl}</div>
      <div class="val">${val}</div>
    </div>`;
  }

  let html = badge;

  if (supplierArt) html += `
    <div class="result-row" style="margin-top:4px">
      <div class="lbl">🔢 Артикул поставщика</div>
      <div class="val big">${supplierArt}</div>
    </div>`;

  html += row('📦 Наименование', esc(name) + (kind ? ' (' + esc(kind) + ')' : ''));
  html += row('🏷️ Бренд',              esc(brand));
  html += row('🏭 Производитель',       esc(producer));
  html += row('🌍 Страна производства', esc(country));
  html += row('📐 Объём / вес',         esc(volume));

  if (expire) {
    const expColor = isExpiringSoon(expire) ? 'var(--red)' : 'var(--green)';
    const expStr   = formatDate(expire);
    if (expStr) html += row('⏳ Срок годности',
      '<span style="color:' + expColor + ';font-weight:700">' + esc(expStr) + '</span>');
  }

  if (producedMs) {
    const prodStr = formatTs(producedMs);
    if (prodStr) html += row('🏗️ Дата производства', esc(prodStr));
  }
  if (introducedMs) {
    const intrStr = formatTs(introducedMs);
    if (intrStr) html += row('📅 Дата ввода в оборот', esc(intrStr));
  }

  const packStr = [packType, packMat].filter(Boolean).join(' / ');
  if (packStr) html += row('📦 Упаковка', esc(packStr));
  if (boxQty)  html += row('📦 Короб',
    esc(String(boxQty)) + ' шт' + (boxGtin ? ' · GTIN: ' + esc(boxGtin) : ''));

  if (cert && cert.number) {
    const certTypeMap = { STATE_REGISTRATION_CERTIFICATE: 'СГР', DECLARATION: 'Декларация', CERTIFICATE: 'Сертификат' };
    const certType = esc(certTypeMap[cert.certDocType] || cert.certDocType || 'Документ');
    html += row('📄 ' + certType, esc(cert.number));
  }

  html += row('📋 ТНВЭД',    esc(tnvd));
  html += row('📜 ТУ / ГОСТ', esc(tuDoc));
  html += row('🔢 EAN / GTIN', esc(gtin));

  resultCard.innerHTML = html;

  scannedEAN = supplierArt || gtin || ean || '';
  sendBtnEl.textContent = supplierArt
    ? `📲 Найти артикул ${supplierArt} в боте`
    : '📲 Отправить в бот';

  sendBtnEl.classList.add('show');
  rescanBtn.classList.add('show');
  setStatus(isOk ? '✅ Товар верифицирован, в обороте' : '⚠️ ' + statusText, isOk ? 'ok' : 'err');
}

function formatTs(ms) {
  if (!ms) return '';
  try { return new Date(ms).toLocaleDateString('ru-RU'); } catch(_) { return ''; }
}

function isExpiringSoon(dateStr) {
  try {
    const exp = new Date(dateStr);
    const now = new Date();
    const days = (exp - now) / (1000 * 60 * 60 * 24);
    return days < 90;
  } catch(_) { return false; }
}

function renderHonestSignFallback(raw, gtin, ean) {
  const short = raw.length > 60 ? raw.substring(0, 60) + '…' : raw;
  resultCard.innerHTML = `
    <div class="result-badge badge-err">⚠️ API недоступен</div>
    <div class="result-row">
      <div class="lbl">Считанный код (DataMatrix)</div>
      <div class="val" style="font-size:12px;word-break:break-all;color:var(--sub)">${short}</div>
    </div>
    ${gtin ? `<div class="divider"></div>
    <div class="result-row">
      <div class="lbl">GTIN из кода</div>
      <div class="val">${gtin}</div>
    </div>` : ''}
    ${ean ? `<div class="divider"></div>
    <div class="result-row">
      <div class="lbl">EAN (для поиска в боте)</div>
      <div class="val big">${ean}</div>
    </div>` : ''}
    <div class="result-row" style="margin-top:4px">
      <div class="val" style="font-size:12px;color:var(--sub)">Сервер Честного знака не ответил. Попробуйте позже или отправьте EAN в бот.</div>
    </div>`;

  scannedEAN = ean || gtin || '';
  if (scannedEAN) sendBtnEl.classList.add('show');
  rescanBtn.classList.add('show');
  setStatus('⚠️ API Честного знака недоступен', 'err');
}

function formatDate(d) {
  if (!d) return '';
  if (/^\d{8}$/.test(d)) return `${d.slice(6)}.${d.slice(4,6)}.${d.slice(0,4)}`;
  try { return new Date(d).toLocaleDateString('ru-RU'); } catch(_) { return d; }
}

// ── Manual input ──────────────────────────────────────
function submitManual() {
  const val = document.getElementById('manual').value.trim();
  if (!val) return;
  if (scanActive && scanner) { scanActive = false; scanner.stop().catch(() => {}); }

  if (currentMode === 'crpt') {
    processHonestSign(val);
  } else {
    const ean = val.replace(/\D/g, '');
    if (ean.length < 8) { setStatus('EAN должен содержать не менее 8 цифр', 'err'); return; }
    showEANResult(ean);
  }
}

// ── Send / copy ───────────────────────────────────────
function sendToBot() {
  if (!scannedEAN) return;
  try { navigator.clipboard.writeText(scannedEAN).catch(() => {}); } catch(_) {}
  document.getElementById('success-ean').textContent = scannedEAN;
  document.getElementById('success').classList.add('show');
}

function openBot() {
  window.open('https://vk.me/club' + VK_GROUP_ID, '_blank');
}

function copyAndConfirm() {
  try {
    navigator.clipboard.writeText(scannedEAN).then(() => {
      const btn = document.getElementById('copy-again-btn');
      btn.textContent = '✅ Скопировано!';
      setTimeout(() => btn.textContent = '📋 Скопировать ещё раз', 1500);
    }).catch(() => {});
  } catch(_) {}
}

function copyEAN() { copyAndConfirm(); }

// ── Reset ─────────────────────────────────────────────
function rescan() {
  scannedEAN = '';
  resultCard.innerHTML = '';
  resultCard.classList.remove('show');
  sendBtnEl.classList.remove('show');
  rescanBtn.classList.remove('show');
  document.getElementById('manual').value = '';
  setStatus('');
  startBtn.style.display = 'block';
}

function resetAll() {
  document.getElementById('success').classList.remove('show');
  rescan();
}

document.getElementById('manual').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitManual();
});
</script>
