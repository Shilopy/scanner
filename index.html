<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Сканер QR / DataMatrix / EAN</title>

<!-- ZXing -->
<script src="https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
  background:#0a0a0a;
  color:#fff;
  text-align:center;
}

.header{
  padding:16px;
}

h1{
  font-size:18px;
  margin:0;
}

p{
  color:#aaa;
  font-size:13px;
}

#reader{
  max-width:480px;
  margin:auto;
  position:relative;
}

video{
  width:100%;
  border-radius:14px;
  background:#000;
}

.scan-box{
  position:absolute;
  border:2px solid #4f8cff;
  width:200px;
  height:200px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:10px;
}

.controls{
  padding:16px;
  max-width:480px;
  margin:auto;
}

button{
  padding:12px 18px;
  margin:6px;
  font-size:15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-start{background:#4f8cff;color:#fff}
.btn-gray{background:#1c1c1e;color:#ccc}

#status{
  font-size:13px;
  margin-top:6px;
  color:#aaa;
}

#result{
  margin-top:16px;
  padding:14px;
  background:#1c1c1e;
  border-radius:12px;
  display:none;
}

.result-big{
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
}

</style>
</head>

<body>

<div class="header">
<h1>📷 Сканер</h1>
<p>QR / DataMatrix / EAN</p>
</div>

<div id="reader">
<video id="video" playsinline></video>
<div class="scan-box"></div>
</div>

<div class="controls">

<button class="btn-start" onclick="startScanner()">📷 Запустить камеру</button>

<button class="btn-gray" onclick="toggleTorch()">🔦 Фонарик</button>

<button class="btn-gray" onclick="toggleZoom()">🔍 Zoom</button>

<div id="status">Нажмите кнопку запуска</div>

<div id="result">
<div>Считанный код</div>
<div id="code" class="result-big"></div>
</div>

</div>

<script>

let codeReader=null
let stream=null
let track=null
let scanning=false
let torch=false
let zoomLevel=1
let deviceId=null

const video=document.getElementById("video")
const statusEl=document.getElementById("status")
const resultBox=document.getElementById("result")
const codeEl=document.getElementById("code")

function setStatus(msg){
  statusEl.textContent=msg
}

async function startScanner(){

try{

setStatus("Поиск камеры...")

const devices=await ZXingBrowser.BrowserCodeReader.listVideoInputDevices()

const backCam=devices.find(d=>
d.label.toLowerCase().includes("back")||
d.label.toLowerCase().includes("rear")||
d.label.toLowerCase().includes("environment")
)

deviceId=backCam?backCam.deviceId:devices[0].deviceId

setStatus("Запуск камеры...")

stream=await navigator.mediaDevices.getUserMedia({
video:{
deviceId:deviceId,
width:{ideal:1920},
height:{ideal:1080},
focusMode:"continuous",
advanced:[{zoom:2}]
}
})

video.srcObject=stream
await video.play()

track=stream.getVideoTracks()[0]

codeReader=new ZXingBrowser.BrowserMultiFormatReader()

scanning=true

setStatus("Наведите камеру на код")

codeReader.decodeFromVideoDevice(deviceId,video,(result,err)=>{

if(!scanning) return

if(result){

navigator.vibrate?.(120)

scanning=false

showResult(result.text)

}

})

}catch(e){

console.error(e)
setStatus("Ошибка доступа к камере")

}

}

function showResult(code){

codeEl.textContent=code
resultBox.style.display="block"

setStatus("Код успешно считан")

}

async function toggleTorch(){

if(!track) return

torch=!torch

try{

await track.applyConstraints({
advanced:[{torch:torch}]
})

}catch(e){

console.log("Фонарик не поддерживается")

}

}

async function toggleZoom(){

if(!track) return

zoomLevel++

if(zoomLevel>4) zoomLevel=1

try{

await track.applyConstraints({
advanced:[{zoom:zoomLevel}]
})

setStatus("Zoom x"+zoomLevel)

}catch(e){

console.log("Zoom unsupported")

}

}

</script>

</body>
</html>
